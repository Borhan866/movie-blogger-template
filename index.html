<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>মুভি ব্লগার - Movie Blogger</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- হেডার -->
    <header class="header">
        <div class="header-content">
            <h1 class="logo">🎬 মুভি ব্লগার</h1>
            <button class="btn-create" id="createBtn">+ নতুন পোস্ট</button>
        </div>
    </header>

    <!-- ক্যাটাগরি সেকশন -->
    <nav class="category-nav">
        <button class="category-btn active" data-category="all">সব</button>
        <button class="category-btn" data-category="bollywood">বলিউড</button>
        <button class="category-btn" data-category="hollywood">হলিউড</button>
        <button class="category-btn" data-category="telugu">তেলুগু</button>
        <button class="category-btn" data-category="tamil">তামিল</button>
        <button class="category-btn" data-category="webseries">ওয়েব সিরিজ</button>
        <button class="category-btn" data-category="tvshow">টিভি শো</button>
    </nav>

    <!-- মেইন কনটেন্ট -->
    <main class="container">
        <div class="posts-grid" id="postsGrid">
            <!-- পোস্টগুলো এখানে লোড হবে -->
        </div>
        <div class="empty-state" id="emptyState">
            <p>কোনো পোস্ট নেই। নতুন পোস্ট তৈরি করুন!</p>
        </div>
    </main>

    <!-- পোস্ট ডিটেইলস মোডাল -->
    <div class="modal" id="detailsModal">
        <div class="modal-content">
            <span class="close" id="closeModal">&times;</span>
            <div class="post-details" id="postDetails">
                <!-- পোস্ট ডিটেইলস এখানে লোড হবে -->
            </div>
        </div>
    </div>

    <!-- পোস্ট তৈরি/এডিট মোডাল -->
    <div class="modal" id="createModal">
        <div class="modal-content modal-create">
            <span class="close" id="closeCreateModal">&times;</span>
            <h2 id="modalTitle">নতুন পোস্ট তৈরি করুন</h2>
            <form id="postForm">
                <div class="form-group">
                    <label for="title">শিরোনাম *</label>
                    <input type="text" id="title" name="title" required>
                </div>

                <div class="form-group">
                    <label for="category">ক্যাটাগরি *</label>
                    <select id="category" name="category" required>
                        <option value="">-- নির্বাচন করুন --</option>
                        <option value="bollywood">বলিউড</option>
                        <option value="hollywood">হলিউড</option>
                        <option value="telugu">তেলুগু</option>
                        <option value="tamil">তামিল</option>
                        <option value="webseries">ওয়েব সিরিজ</option>
                        <option value="tvshow">টিভি শো</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="description">বর্ণনা *</label>
                    <textarea id="description" name="description" rows="5" required></textarea>
                </div>

                <div class="form-group">
                    <label for="image">ছবির URL *</label>
                    <input type="url" id="image" name="image" placeholder="https://example.com/image.jpg" required>
                    <img id="imagePreview" class="image-preview" style="display: none;" alt="Preview">
                </div>

                <div class="form-group">
                    <label for="rating">রেটিং (0-5) *</label>
                    <input type="number" id="rating" name="rating" min="0" max="5" step="0.5" required>
                </div>

                <div class="form-group">
                    <label for="releaseYear">রিলিজ সাল *</label>
                    <input type="number" id="releaseYear" name="releaseYear" min="1900" max="2100" required>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">পোস্ট করুন</button>
                    <button type="button" class="btn btn-secondary" id="cancelBtn">বাতিল</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
